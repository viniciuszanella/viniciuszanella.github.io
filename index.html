<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Official Product Offers</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
    }

    header {
      background: #000;
      color: #fff;
      padding: 15px 30px;
      font-size: 18px;
    }

    .content {
      padding: 30px;
    }

    .product {
      background: #fff;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.08);
      max-width: 300px;
    }

    .product img {
      width: 100%;
      border-radius: 8px;
    }

    .product h2 {
      font-size: 18px;
      margin: 10px 0;
    }

    .product a {
      display: inline-block;
      margin-top: 10px;
      padding: 10px 15px;
      background: #000;
      color: #fff;
      text-decoration: none;
      border-radius: 5px;
      font-size: 14px;
    }

    .product a:hover {
      background: #333;
    }

    @media (max-width: 600px) {
      .content {
        padding: 15px;
      }

      .product {
        max-width: 100%;
      }
    }
  </style>
</head>
<body>

<header>
  Official Product Offers
</header>

<div class="content">
  <div class="product">
    <img src="/mnt/data/Zenthia-300x300.webp" alt="Zenthia">
    <h2>Zenthia</h2>
    <a href="/zenthia">View Product</a>
  </div>
</div>

</body>
</html>
